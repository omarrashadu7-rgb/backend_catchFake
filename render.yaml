services:
  - type: web
    name: deepfake-detection-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_NAME
        value: DeepFake Detection API
      - key: APP_VERSION
        value: 1.0.0
      - key: DEBUG
        value: "False"
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_MINUTES
        value: "60"
      - key: VIDEO_SAMPLE_FRAMES
        value: "16"
      # ⚠️ الـ secrets دي هتضيفها يدوياً في Render Dashboard
      # MONGO_URI
      # JWT_SECRET_KEY
      # HF_TOKEN
      # HF_MODEL_URL
      # HF_SPACE_ID
      # HF_SPACE_API_NAME
      # HF_VIDEO_SPACE_ID
      # HF_VIDEO_SPACE_API_NAME
